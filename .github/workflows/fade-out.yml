name: 社区词衰减

on:
  schedule:
    - cron: '0 18 * * *'  # 每天 UTC 18:00（北京时间 02:00）
  workflow_dispatch:

permissions: {}

jobs:
  fade-out:
    runs-on: ubuntu-latest
    steps:
      - name: 统计投票并衰减
        uses: actions/github-script@v7
        env:
          GIST_ID: fb0670351105898b40e2d23a0dae3cd7
        with:
          script: |
            const GIST_ID = process.env.GIST_ID;
            const gist = await github.rest.gists.get({ gist_id: GIST_ID });
            const db = JSON.parse(gist.data.files['community.json'].content);

            for (const mode of ['ok', 'no']) {
              for (const category of ['leader', 'colleague']) {
                const kept = [];
                for (const item of db[mode][category]) {
                  const result = await github.graphql(
                    `query($owner: String!, $repo: String!, $num: Int!) {
                      repository(owner: $owner, name: $repo) {
                        discussion(number: $num) {
                          up: reactions(content: THUMBS_UP) { totalCount }
                          down: reactions(content: THUMBS_DOWN) { totalCount }
                        }
                      }
                    }`,
                    { owner: context.repo.owner, repo: context.repo.repo, num: item.discussion }
                  );
                  const up = result.repository.discussion.up.totalCount;
                  const down = result.repository.discussion.down.totalCount;
                  const total = up + down;

                  if (total >= 10 && down > up * 1.5) {
                    core.info(`衰减：${item.text}（👍${up} 👎${down}，共${total}票）`);
                  } else {
                    kept.push(item);
                  }
                }
                db[mode][category] = kept;
              }
            }

            const content = JSON.stringify(db, null, 2) + '\n';
            await github.rest.gists.update({
              gist_id: GIST_ID,
              files: { 'community.json': { content } }
            });
            core.info('衰减完成');