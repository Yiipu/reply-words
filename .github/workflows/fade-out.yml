name: 社区词衰减

on:
  schedule:
    - cron: '0 18 * * *'  # 每天 UTC 18:00（北京时间 02:00）
  workflow_dispatch:

permissions:
  discussions: write

jobs:
  fade-out:
    runs-on: ubuntu-latest
    steps:
      - name: 统计投票并衰减
        uses: actions/github-script@v7
        env:
          GIST_ID: fb0670351105898b40e2d23a0dae3cd7
          CATEGORY_ID: DIC_kwDOTg3sHc4DBxyQ
        with:
          script: |
            const GIST_ID = process.env.GIST_ID;
            const CATEGORY_ID = process.env.CATEGORY_ID;
            const MAX_RETRIES = 3;

            for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
              const gist = await github.rest.gists.get({ gist_id: GIST_ID });
              const db = JSON.parse(gist.data.files['community.json'].content);
              const gistUpdatedAt = new Date(gist.data.updated_at).getTime();

              // 批量拉取所有 Discussion 的投票数（支持分页）
              const voteMap = {};
              let after = null;
              do {
                const { repository } = await github.graphql(
                  `query($owner: String!, $repo: String!, $catId: ID!, $after: String) {
                    repository(owner: $owner, name: $repo) {
                      discussions(first: 100, categoryId: $catId, after: $after) {
                        nodes {
                          id
                          number
                          up: reactions(content: THUMBS_UP) { totalCount }
                          down: reactions(content: THUMBS_DOWN) { totalCount }
                        }
                        pageInfo { hasNextPage, endCursor }
                      }
                    }
                  }`,
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    catId: CATEGORY_ID,
                    after,
                  }
                );
                for (const d of repository.discussions.nodes) {
                  voteMap[d.number] = { id: d.id, up: d.up.totalCount, down: d.down.totalCount };
                }
                after = repository.discussions.pageInfo.hasNextPage
                  ? repository.discussions.pageInfo.endCursor
                  : null;
              } while (after);

              const toRemove = [];
              for (const mode of ['ok', 'no']) {
                for (const category of ['leader', 'colleague']) {
                  const kept = [];
                  for (const item of db[mode][category]) {
                    const votes = voteMap[item.discussion];
                    if (!votes) {
                      kept.push(item);
                      continue;
                    }
                    const { up, down } = votes;
                    const total = up + down;
                    if (total >= 10 && down > up * 1.5) {
                      core.info(`衰减：${item.text}（👍${up} 👎${down}，共${total}票）`);
                      toRemove.push({ ...item, nodeId: votes.id });
                    } else {
                      kept.push(item);
                    }
                  }
                  db[mode][category] = kept;
                }
              }

              if (toRemove.length === 0) {
                core.info('无需衰减');
                return;
              }

              const content = JSON.stringify(db, null, 2) + '\n';
              const gistCheck = await github.rest.gists.get({ gist_id: GIST_ID });
              const checkTime = new Date(gistCheck.data.updated_at).getTime();
              if (checkTime !== gistUpdatedAt) {
                core.warning(`Gist 在衰减期间被修改，第 ${attempt + 1} 次重试中...`);
                continue;
              }

              await github.rest.gists.update({
                gist_id: GIST_ID,
                files: { 'community.json': { content } },
              });

              // Gist 写回成功后，关闭已衰减的 Discussion（best-effort）
              for (const item of toRemove) {
                try {
                  await github.graphql(
                    `mutation($id: ID!) {
                      closeDiscussion(input: {discussionId: $id, reason: RESOLVED}) {
                        discussion { id }
                      }
                    }`,
                    { id: item.nodeId }
                  );
                  core.info(`已关闭 Discussion：${item.text}`);
                } catch (e) {
                  core.warning(`关闭 Discussion 失败：${item.text} — ${e.message}`);
                }
              }

              core.info('衰减完成');
              return;
            }
            core.setFailed('重试次数耗尽，Gist 竞态条件未解决');
