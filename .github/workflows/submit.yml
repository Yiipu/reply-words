name: 投稿处理

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: '要重跑的 Issue 编号'
        required: true

permissions:
  discussions: write
  issues: write

jobs:
  submit:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (contains(github.event.issue.labels.*.name, 'word-submission') &&
       github.event.issue.state == 'open')
    runs-on: ubuntu-latest
    steps:
      - name: 解析校验并写入
        uses: actions/github-script@v9
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: fb0670351105898b40e2d23a0dae3cd7
        with:
          script: |
            const GIST_ID = process.env.GIST_ID;
            const gistOctokit = getOctokit(process.env.GIST_TOKEN);

            let issueNumber, body;
            if (context.eventName === 'workflow_dispatch') {
              issueNumber = parseInt(context.payload.inputs.issue_number, 10);
              const { data: issue } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              body = issue.body || '';
            } else {
              issueNumber = context.issue.number;
              body = context.payload.issue.body || '';
            }

            const { repository } = await github.graphql(
              `query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  id
                  discussionCategories(first: 100) { nodes { id name } }
                }
              }`,
              { owner: context.repo.owner, repo: context.repo.repo }
            );
            const REPO_ID = repository.id;
            const category = repository.discussionCategories.nodes.find(c => c.name === 'Announcements');
            if (!category) {
              core.setFailed('未找到 Announcements 类别');
              return;
            }
            const CATEGORY_ID = category.id;

            function field(label) {
              const re = new RegExp('### ' + label + '\\s*\\n\\s*\\n([^\\n]*)');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const text = field('词条内容');
            const cat = field('类别');
            const mode = field('模式');

            const errors = [];
            if (!text) errors.push('内容不能为空');
            if (text.length > 50) errors.push('词条长度不能超过50个字符');
            if (!['leader', 'colleague'].includes(cat)) errors.push('类别无效');
            if (!['ok', 'no'].includes(mode)) errors.push('模式无效');

            if (errors.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '❌ 投稿未通过：\n' + errors.map(e => '- ' + e).join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
              });
              return;
            }

            // 查重：已完成（discussion 不为 null）则跳过，仅有占位则继续
            let hasPlaceholder = false;
            {
              const gist = await gistOctokit.rest.gists.get({ gist_id: GIST_ID });
              const db = JSON.parse(gist.data.files['community.json'].content);
              const existing = db[mode][cat].find(w => w.text === text);
              if (existing) {
                if (existing.discussion != null) {
                  core.info('该词条已收录，跳过');
                  return;
                }
                hasPlaceholder = true;
                core.info('检测到未完成的占位，跳过写入直接创建 Discussion');
              }
            }

            // 先写 Gist 占位，保证重跑时查重可命中
            if (!hasPlaceholder) {
              const MAX_RETRIES = 3;
              let placeholderWritten = false;
              for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
                const gist = await gistOctokit.rest.gists.get({ gist_id: GIST_ID });
                const db = JSON.parse(gist.data.files['community.json'].content);
                const gistUpdatedAt = new Date(gist.data.updated_at).getTime();

                db[mode][cat].push({ text, discussion: null });
                const content = JSON.stringify(db, null, 2) + '\n';

                const gistCheck = await gistOctokit.rest.gists.get({ gist_id: GIST_ID });
                const checkTime = new Date(gistCheck.data.updated_at).getTime();
                if (checkTime !== gistUpdatedAt) {
                  core.warning(`Gist 在投稿期间被修改，第 ${attempt + 1} 次重试中...`);
                  continue;
                }

                await gistOctokit.rest.gists.update({
                  gist_id: GIST_ID,
                  files: { 'community.json': { content } },
                });
                placeholderWritten = true;
                core.info(`Gist 占位写入成功（第 ${attempt + 1} 次尝试）`);
                break;
              }
              if (!placeholderWritten) {
                core.setFailed('Gist 占位写入失败，重试次数耗尽');
                return;
              }
            }

            // 创建 Discussion
            const result = await github.graphql(
              `mutation($repoId: ID!, $catId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: {repositoryId: $repoId, categoryId: $catId, title: $title, body: $body}) {
                  discussion { number }
                }
              }`,
              {
                repoId: REPO_ID,
                catId: CATEGORY_ID,
                title: text,
                body: `来自投稿 #${issueNumber}\n\n类别：${cat}　模式：${mode}\n\n给这条回复语投票 👍/👎`,
              }
            );
            const discussionNumber = result.createDiscussion.discussion.number;

            // 回填 discussion 编号（best-effort）
            try {
              const finalGist = await gistOctokit.rest.gists.get({ gist_id: GIST_ID });
              const finalDb = JSON.parse(finalGist.data.files['community.json'].content);
              const entry = finalDb[mode][cat].find(w => w.text === text && w.discussion === null);
              if (entry) entry.discussion = discussionNumber;
              await gistOctokit.rest.gists.update({
                gist_id: GIST_ID,
                files: { 'community.json': { content: JSON.stringify(finalDb, null, 2) + '\n' } },
              });
            } catch (e) {
              core.warning(`回填 discussion 编号失败：${e.message}`);
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ 投稿已通过，已收录：https://github.com/${context.repo.owner}/${context.repo.repo}/discussions/${discussionNumber}`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              title: `[投稿] ${text}`,
              state: 'closed',
            });
